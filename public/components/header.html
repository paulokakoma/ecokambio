<header id="main-header" class="bg-white shadow-sm transition-all duration-300 border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-2 sm:px-3 lg:px-8 py-1 sm:py-1.5 flex items-center">
        <a href="/"
            class="flex items-center space-x-1 sm:space-x-2 md:space-x-2.5 hover:opacity-80 transition-all duration-200 group">
            <img src="/assets/main-logo.svg" alt="EcoKambio - Plataforma de Taxas de Câmbio em Angola" width="56"
                height="56" class="h-5 sm:h-7 md:h-8 w-auto transition-transform duration-200 group-hover:scale-105">
            <span class="text-xs sm:text-sm md:text-lg font-bold text-emerald-600">EcoKambio</span>
        </a>

        <!-- Navigation -->
        <nav
            class="flex-1 flex justify-end items-center space-x-1 sm:space-x-2 md:space-x-3 lg:space-x-5 ml-1 sm:ml-auto">
            <!-- Promo Cards - Netflix & Visa -->
            <div class="hidden md:flex items-center space-x-6">
                <!-- Netflix Card -->
                <a href="/netflix"
                    class="flex flex-col items-center group transition-transform hover:scale-105 duration-300">
                    <img src="/assets/netflix.png" alt="Netflix Angola" class="h-14 w-auto object-contain"
                        loading="lazy">
                    <span class="text-[11px] font-semibold text-red-600 mt-1">Netflix Angola</span>
                </a>
                
                <!-- Visa Card -->
                <a href="/visa"
                    class="flex flex-col items-center group transition-transform hover:scale-105 duration-300 border-l border-gray-100 pl-4">
                    <img src="/assets/visa.png" alt="Visa Virtual" class="h-14 w-auto object-contain"
                        loading="lazy">
                    <span class="text-[11px] font-semibold text-indigo-600 mt-1">Visa Virtual</span>
                </a>
            </div>

            <!-- Card Container (Mobile) - Rotating Content -->
            <div class="md:hidden relative overflow-hidden" style="width: 170px; height: 120px;">
                <!-- Netflix Card -->
                <a href="/netflix" id="header-netflix-card"
                    class="header-card absolute top-0 left-0 w-full h-full flex flex-col items-center justify-center text-center transition-all duration-500 ease-in-out opacity-100"
                    title="Netflix Angola">
                    <img src="/assets/netflix.png" alt="Netflix com EcoKambio" class="w-full h-auto object-contain px-2"
                        style="max-width: 160px; max-height: 90px;">
                    <span class="text-[9px] font-semibold text-red-600 mt-1">Netflix Angola</span>
                </a>

                <!-- Visa Card -->
                <a href="/visa" id="header-visa-card"
                    class="header-card absolute top-0 left-0 w-full h-full flex flex-col items-center justify-center text-center transition-all duration-500 ease-in-out opacity-0 pointer-events-none translate-x-full"
                    title="Visa Virtual">
                    <img src="/assets/visa.png" alt="Visa Virtual" class="w-full h-auto object-contain px-2"
                        style="max-width: 160px; max-height: 90px;">
                    <span class="text-[9px] font-semibold text-indigo-600 mt-1 text-nowrap">Visa Virtual</span>
                </a>
            </div>
        </nav>
    </div>
</header>

<style>
    /* Transição suave para o efeito de glassmorphism */
    #main-header {
        transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1),
            backdrop-filter 0.4s cubic-bezier(0.4, 0, 0.2, 1),
            box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1),
            border-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #main-header.scrolled {
        background: linear-gradient(to bottom,
                rgba(255, 255, 255, 0.8) 0%,
                rgba(255, 255, 255, 0.75) 100%);
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        border-bottom-color: rgba(255, 255, 255, 0.3);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.10);
    }

    .header-card.active {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(0);
    }

    .header-card.inactive {
        opacity: 0;
        pointer-events: none;
        transform: translateX(-100%);
    }
</style>

<script>
    (function () {
        // Enchanced header scroll effect
        const header = document.getElementById('main-header');
        if (header) {
            window.addEventListener('scroll', () => {
                const currentScroll = window.pageYOffset;
                if (currentScroll > 20) {
                    header.classList.add('shadow-lg', 'scrolled');
                    header.classList.remove('shadow-sm');
                } else {
                    header.classList.add('shadow-sm');
                    header.classList.remove('shadow-lg', 'scrolled');
                }
            }, { passive: true });
        }

        // Automatic Card Rotation (Mobile Only)
        const netflixCard = document.getElementById('header-netflix-card');
        const visaCard = document.getElementById('header-visa-card');
        let currentCard = 0; // 0 for Netflix, 1 for Visa

        if (netflixCard && visaCard) {
            setInterval(() => {
                if (currentCard === 0) {
                    // Switch to Visa
                    netflixCard.style.opacity = '0';
                    netflixCard.style.transform = 'translateX(-20px)';
                    netflixCard.style.pointerEvents = 'none';

                    setTimeout(() => {
                        visaCard.style.opacity = '1';
                        visaCard.style.transform = 'translateX(0)';
                        visaCard.style.pointerEvents = 'auto';
                    }, 500);
                    currentCard = 1;
                } else {
                    // Switch to Netflix
                    visaCard.style.opacity = '0';
                    visaCard.style.transform = 'translateX(20px)';
                    visaCard.style.pointerEvents = 'none';

                    setTimeout(() => {
                        netflixCard.style.opacity = '1';
                        netflixCard.style.transform = 'translateX(0)';
                        netflixCard.style.pointerEvents = 'auto';
                    }, 500);
                    currentCard = 0;
                }
            }, 6000); // 6 seconds per card
        }
    })();
</script>
