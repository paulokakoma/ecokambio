    <script>
        async function init() {
            const params = new URLSearchParams(window.location.search);
            const id = decodeURIComponent(params.get('id') || '');
            
            let products = {};
            try {
                // Simulate delay slightly to show skeleton beauty
                const response = await fetch('/products.json?v=' + Date.now());
                if (!response.ok) throw new Error('Falha ao carregar base de dados.');
                products = await response.json();
                
                // Extra artificial delay to demonstrate the shimmer skeleton
                await new Promise(r => setTimeout(r, 600)); 
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('product-skeleton').innerHTML = '<p class="text-red-500 font-bold p-10 text-center">Falta o catálogo. Tente novamente mais tarde.</p>';
                return;
            }

            const product = products[id];
            if (!product) {
                console.error(`Produto não encontrado para id="${id}". Chaves disponíveis:`, Object.keys(products));
                document.getElementById('product-skeleton').innerHTML = '<p class="text-red-500 font-bold p-10 text-center">Produto não encontrado. <a href="/" class="underline">Voltar à loja</a></p>';
                return;
            }
            
            // Hide Skeleton, Show Content
            document.getElementById('product-skeleton').classList.add('hidden');
            document.getElementById('product-details-content').classList.remove('hidden');
            document.getElementById('related-section').classList.remove('hidden');

            // Set Data
            document.title = `${product.name} - EcoKambio`;
            document.getElementById('product-name').textContent = product.name;
            document.getElementById('breadcrumb-name').textContent = product.name;
            document.getElementById('breadcrumb-category').textContent = product.category;
            document.getElementById('product-price').textContent = product.price;
            document.getElementById('product-old-price').textContent = product.oldPrice || '';
            document.getElementById('product-description').textContent = product.description;
            
            // Images: use the images array if available, otherwise use the single img
            const allImages = (product.images && product.images.length > 0) ? product.images : (product.img ? [product.img] : []);
            
            const mainImg = document.getElementById('product-main-image');
            let currentImageIndex = 0;

            // Build slide indicator (dots) - only show on mobile
            const slideIndicator = document.getElementById('slide-indicator');
            if (allImages.length > 1) {
                slideIndicator.innerHTML = allImages.map((_, i) => `
                    <span class="dot w-2 h-2 rounded-full bg-white/60 ${i === 0 ? 'bg-white w-3' : ''} transition-all duration-300"></span>
                `).join('');
            }

            // Function to switch image with slide effect
            const switchImage = (index, direction = 'fade') => {
                if (index === currentImageIndex) return; // evitar transições sem mudança
                if (index < 0) index = allImages.length - 1;
                if (index >= allImages.length) index = 0;
                currentImageIndex = index;
                
                if (direction === 'fade') {
                    mainImg.style.transition = 'opacity 250ms ease-in-out';
                    mainImg.style.opacity = '0';
                    setTimeout(() => {
                        mainImg.src = allImages[index];
                        mainImg.style.opacity = '1';
                    }, 250);
                } else {
                    // Smooth slide para touch swipe
                    const slideOut = direction === 'next' ? '-30px' : '30px';
                    const slideIn = direction === 'next' ? '30px' : '-30px';
                    
                    mainImg.style.transition = 'transform 200ms cubic-bezier(0.4, 0, 0.2, 1), opacity 200ms ease-in-out';
                    mainImg.style.transform = `translateX(${slideOut})`;
                    mainImg.style.opacity = '0';
                    
                    setTimeout(() => {
                        mainImg.src = allImages[index];
                        
                        // Reseta posição instantaneamente invisível
                        mainImg.style.transition = 'none';
                        mainImg.style.transform = `translateX(${slideIn})`;
                        // Força o reflow do browser
                        void mainImg.offsetWidth;
                        
                        // Anima para o centro
                        mainImg.style.transition = 'transform 300ms cubic-bezier(0.16, 1, 0.3, 1), opacity 300ms ease-in-out';
                        mainImg.style.transform = 'translateX(0)';
                        mainImg.style.opacity = '1';
                    }, 200);
                }
                
                // Update indicators
                slideIndicator.querySelectorAll('.dot').forEach((dot, i) => {
                    dot.className = `dot w-2 h-2 rounded-full bg-white/60 ${i === index ? 'bg-white w-3' : ''} transition-all duration-300`;
                });
                // Update thumbnail selection
                thumbGallery?.querySelectorAll('.thumb-btn').forEach((b, i) => {
                    if (i === index) {
                        b.classList.add('border-emerald-500');
                        b.classList.remove('border-transparent');
                        b.querySelector('img').classList.replace('opacity-60', 'opacity-100');
                    } else {
                        b.classList.remove('border-emerald-500');
                        b.classList.add('border-transparent');
                        b.querySelector('img')?.classList.replace('opacity-100', 'opacity-60');
                    }
                });
                
                // Update color selection if applicable
                const imagesDataArray = product.imagesData || [];
                const currentImgObj = imagesDataArray[index];
                if (currentImgObj && currentImgObj.color) {
                    const colorBtns = document.querySelectorAll('#color-selectors button');
                    document.getElementById('color-label').textContent = currentImgObj.color;
                    colorBtns.forEach(b => {
                        if (b.dataset.color === currentImgObj.color) {
                            b.classList.add('ring-2', 'ring-emerald-500', 'border-emerald-500', 'text-emerald-700', 'bg-emerald-50');
                            b.classList.remove('border-slate-200', 'text-slate-600', 'bg-white');
                        } else {
                            b.classList.remove('ring-2', 'ring-emerald-500', 'border-emerald-500', 'text-emerald-700', 'bg-emerald-50');
                            b.classList.add('border-slate-200', 'text-slate-600', 'bg-white');
                        }
                    });
                } else if (imagesDataArray.length > 0) {
                     document.getElementById('color-label').textContent = 'Padrão';
                     document.querySelectorAll('#color-selectors button').forEach(b => {
                        b.classList.remove('ring-2', 'ring-emerald-500', 'border-emerald-500', 'text-emerald-700', 'bg-emerald-50');
                        b.classList.add('border-slate-200', 'text-slate-600', 'bg-white');
                     });
                }
            };

            mainImg.src = allImages[0] || '';
            mainImg.alt = product.name;

            // Touch/Swipe support for main image
            const galleryContainer = document.getElementById('image-gallery-container');
            let touchStartX = 0;
            let touchEndX = 0;
            const SWIPE_THRESHOLD = 50;

            if (allImages.length > 1) {
                galleryContainer.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });

                galleryContainer.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    const diff = touchStartX - touchEndX;
                    if (Math.abs(diff) > SWIPE_THRESHOLD) {
                        if (diff > 0) {
                            switchImage(currentImageIndex + 1, 'next'); // Swipe left - next
                        } else {
                            switchImage(currentImageIndex - 1, 'prev'); // Swipe right - previous
                        }
                    }
                }, { passive: true });
            }

            // Build thumbnail gallery dynamically from real images
            const thumbGallery = document.getElementById('thumbnail-gallery');
            slideIndicator.classList.toggle('md:hidden', allImages.length <= 1); // Hide dots on desktop if single image
            if (allImages.length <= 1) {
                // Hide the whole gallery if there's only one (or no) image
                thumbGallery.classList.add('hidden');
                slideIndicator.classList.add('hidden');
            } else {
                thumbGallery.innerHTML = allImages.map((url, i) => `
                    <button data-index="${i}" class="thumb-btn w-12 h-12 md:w-16 md:h-16 rounded-xl md:rounded-2xl border-2 ${i === 0 ? 'border-emerald-500' : 'border-transparent'} bg-white shadow-sm p-1 overflow-hidden transition-transform hover:scale-105 focus:outline-none hover:border-slate-300">
                        <img src="${url}" class="w-full h-full object-contain ${i === 0 ? 'opacity-100' : 'opacity-60'}" alt="Vista ${i+1}">
                    </button>
                `).join('');

                // Thumbnail click handler — use switchImage function
                thumbGallery.querySelectorAll('.thumb-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const index = parseInt(btn.dataset.index);
                        switchImage(index);
                    });
                });
            }

            const badge = document.getElementById('product-category-badge');
            badge.textContent = product.category;
            badge.className = `px-3 py-1.5 rounded-full text-[11px] font-black uppercase tracking-widest mb-3 inline-block shadow-sm backdrop-blur-md text-white border border-white/20 ${product.badgeClass}`;

            // Show capacity variants solely for electronics/mobiles
            if (product.category === 'Telemóveis' || product.category === 'Computadores') {
                document.getElementById('capacity-container').classList.remove('hidden');
            }

            // WhatsApp link builder
            const targetPhone = product.whatsappNumber || "244938948994";
            const cleanPhone = targetPhone.replace(/[^0-9+]/g, '');
            const whatsappText = encodeURIComponent(`Olá EcoKambio! Tenho interesse no "${product.name}" através da loja online. Podem enviar detalhes?`);
            document.getElementById('whatsapp-order-link').href = `https://wa.me/${cleanPhone.startsWith('+') ? cleanPhone.substring(1) : cleanPhone}?text=${whatsappText}`;

            // --- Interactivity: Colors ---
            const colorContainer = document.getElementById('dynamic-color-container');
            const colorSelectors = document.getElementById('color-selectors');
            const imagesDataArray = product.imagesData || [];
            const imagesWithColors = imagesDataArray.filter(img => img.color);
            
            if (imagesWithColors.length > 0) {
                colorContainer.classList.remove('hidden');
                
                // Get unique colors but keep first image index of that color
                const colorMap = new Map();
                imagesDataArray.forEach((img, idx) => {
                    if (img.color && !colorMap.has(img.color)) {
                        colorMap.set(img.color, idx);
                    }
                });

                colorSelectors.innerHTML = Array.from(colorMap.entries()).map(([color, index]) => `
                    <button data-color="${color}" data-index="${index}" class="px-3 py-1.5 md:px-4 md:py-2 text-xs font-bold rounded-xl border-2 border-slate-200 bg-white text-slate-600 transition-all focus:outline-none shadow-sm hover:border-slate-300">
                        ${color}
                    </button>
                `).join('');

                const colorBtns = document.querySelectorAll('#color-selectors button');
                colorBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        const targetIndex = parseInt(btn.dataset.index);
                        switchImage(targetIndex);
                    });
                });
                
                // Init first color
                if (imagesDataArray[0]?.color) {
                    document.getElementById('color-label').textContent = imagesDataArray[0].color;
                    const firstBtn = colorSelectors.querySelector(`button[data-color="${imagesDataArray[0].color}"]`);
                    if (firstBtn) {
                        firstBtn.classList.add('ring-2', 'ring-emerald-500', 'border-emerald-500', 'text-emerald-700', 'bg-emerald-50');
                        firstBtn.classList.remove('border-slate-200', 'text-slate-600', 'bg-white');
                    }
                } else {
                     document.getElementById('color-label').textContent = 'Padrão';
                }
            }

            const capBtns = document.querySelectorAll('#capacity-selectors button');
            capBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    capBtns.forEach(b => {
                        b.className = 'px-3 py-1.5 md:px-4 md:py-2.5 text-xs font-bold rounded-xl border-2 border-slate-200 bg-white text-slate-600 hover:border-slate-300 transition-colors focus:outline-none shadow-sm';
                    });
                    btn.className = 'px-3 py-1.5 md:px-4 md:py-2.5 text-xs font-bold rounded-xl border-2 border-emerald-500 bg-emerald-50 text-emerald-700 transition-colors focus:outline-none shadow-sm';
                });
            });

            // Recomended Products
            const relatedGrid = document.getElementById('related-products-grid');
            const otherIds = Object.keys(products).filter(key => key !== id).sort(() => 0.5 - Math.random()).slice(0, 4);
            
            otherIds.forEach(key => {
                const item = products[key];
                const card = `
                    <a href="product-detail.html?id=${key}" class="flex-1 w-[45%] md:w-1/4 bg-white p-3 rounded-2xl border border-slate-100 shadow-sm hover:-translate-y-1 hover:shadow-xl hover:border-emerald-200 transition-all duration-300 group flex flex-col">
                        <div class="square-box overflow-hidden rounded-xl mb-3 bg-slate-50 flex items-center justify-center p-2">
                            <img src="${item.img}" alt="${item.name}" class="w-full h-full object-contain group-hover:scale-110 transition-transform duration-500 mix-blend-multiply">
                        </div>
                        <h4 class="font-extrabold text-slate-800 text-[11px] truncate mb-1">${item.name}</h4>
                        <p class="text-[12px] text-emerald-600 font-bold mt-auto pt-1">${item.price}</p>
                    </a>
                `;
                relatedGrid.innerHTML += card;
            });
        }

        // === ACCORDION: Ver mais ===
        document.addEventListener('DOMContentLoaded', () => {
            const seeMoreBtn  = document.getElementById('see-more-btn');
            const seeMoreBody = document.getElementById('see-more-body');

            if (seeMoreBtn && seeMoreBody) {
                seeMoreBtn.addEventListener('click', () => {
                    const isOpen = seeMoreBody.classList.toggle('expanded');
                    seeMoreBtn.classList.toggle('open', isOpen);
                    seeMoreBtn.setAttribute('aria-expanded', isOpen);
                });
            }
        });

        document.addEventListener('DOMContentLoaded', init);
    </script>
