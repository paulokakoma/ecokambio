# fly.toml app configuration file for ecokambio
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'ecokambio'
primary_region = 'jnb' # Johannesburg - mais próximo de Angola (latência ~50ms)

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

# Processos removidos: O Fly.io usará o CMD padrão do Dockerfile criando apenas 1 máquina

# --- CONFIGURAÇÃO DE REDE ---
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1 # Reduzido para 1 se quiser poupar, ou mantém 2 para HA


  [[http_service.checks]]
    grace_period = '15s'  # Tempo após boot antes de iniciar health checks
    interval = '20s'      # Verifica a cada 20 segundos 
    method = 'GET'
    timeout = '5s'        # Timeout de 5 segundos
    path = '/health'
    
  [[http_service.checks]]
    type = 'tcp'
    interval = '15s'      # Check TCP a cada 15 segundos
    timeout = '3s'
    grace_period = '10s'

[mounts]
  source = 'ecokambio_sessions'
  destination = '/usr/src/app/sessions'
  initial_size = '1gb'

# Máquina Única (Faz tudo: Web + Worker + Scraper)
[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

# Adicionar memória SWAP para evitar que picos do Playwright matem o processo (OOM)
swap_size_mb = 1024
