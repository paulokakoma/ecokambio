# fly.toml app configuration file generated for ecokambio on 2026-04-22T21:55:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ecokambio'
primary_region = 'jnb'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[[mounts]]
  source = 'ecokambio_sessions'
  destination = '/usr/src/app/sessions'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '20s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

  [[http_service.checks]]
    interval = '15s'
    timeout = '3s'
    grace_period = '20s'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
