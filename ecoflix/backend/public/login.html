<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - EcoFlix Admin</title>
    <link rel="icon" href="/assets/favicon.ico" sizes="any">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">

    <!-- SECURITY: Prevent caching of login page -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta name="robots" content="noindex, nofollow">



    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ecokambio.com/login">
    <meta property="og:title" content="Acesso Restrito - EcoFlix">
    <meta property="og:description" content="Área de acesso restrito para administração do EcoFlix.">
    <meta property="og:image" content="https://ecokambio.com/assets/social-share-banner.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://ecokambio.com/login">
    <meta property="twitter:title" content="Acesso Restrito - EcoFlix">
    <meta property="twitter:description" content="Área de acesso restrito para administração do EcoFlix.">
    <meta property="twitter:image" content="https://ecokambio.com/assets/social-share-banner.png">

    <link rel="stylesheet" href="/css/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>

</head>

<body class="flex flex-col min-h-screen bg-slate-900 relative overflow-hidden font-sans">

    <!-- Decorative Background -->
    <div class="absolute inset-0 z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] bg-indigo-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-50 animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-[40vw] h-[40vw] bg-red-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-40 animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-[40vw] h-[40vw] bg-blue-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-40 animate-blob animation-delay-4000"></div>
    </div>

    <main class="flex-1 flex items-center justify-center py-12 px-4 relative z-10">
        <div class="w-full max-w-md p-10 space-y-8 bg-white/10 backdrop-blur-xl border border-white/20 rounded-[2rem] shadow-2xl">
            <div class="text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-600/20 text-red-500 mb-6 border border-red-500/30 shadow-[0_0_15px_rgba(220,38,38,0.3)]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h1 class="text-4xl font-bold text-white tracking-tight mb-2">EcoFlix</h1>
                <p class="text-sm font-medium text-slate-300 tracking-wide uppercase">Acesso Restrito - Admin</p>
            </div>
            
            <form id="login-form" class="mt-8 space-y-6">
                <div class="space-y-5">
                    <div>
                        <label for="username" class="block text-sm font-medium text-slate-300 mb-1 ml-1">Email Autorizado</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
                                    <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
                                </svg>
                            </div>
                            <input id="username" name="username" type="email" required
                                class="block w-full pl-11 pr-3 py-3 border border-slate-600 bg-slate-800/50 text-white rounded-xl placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all sm:text-sm"
                                placeholder="admin@ecokambio.com" autocomplete="off">
                        </div>
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-300 mb-1 ml-1">Palavra-passe</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                                </svg>
                            </div>
                            <input id="password" name="password" type="password" required
                                class="block w-full pl-11 pr-3 py-3 border border-slate-600 bg-slate-800/50 text-white rounded-xl placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all sm:text-sm"
                                placeholder="••••••••" autocomplete="off">
                        </div>
                    </div>
                </div>

                <div id="error-message" class="text-sm text-red-400 text-center h-4 font-medium transition-all"></div>

                <div class="pt-2">
                    <button type="submit"
                        class="relative w-full flex justify-center items-center gap-2 py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-gradient-to-r from-red-600 to-red-700 hover:from-red-500 hover:to-red-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-red-500 shadow-[0_0_20px_rgba(220,38,38,0.4)] hover:shadow-[0_0_25px_rgba(220,38,38,0.6)] transition-all transform hover:-translate-y-0.5">
                        <span>Entrar no Painel</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <style>
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }
    </style>


    <script>
        const loginForm = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('error-message');
        const submitButton = loginForm.querySelector('button[type="submit"]');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Desabilita o botão e mostra feedback de carregamento
            submitButton.disabled = true;
            submitButton.textContent = 'Verificando...';

            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            errorDiv.textContent = '';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password, redirect: '/ecoflix/admin' }),
                });

                if (response.ok) {
                    sessionStorage.setItem('admin_session_alive', 'true');
                    window.location.href = '/ecoflix/admin';
                } else {
                    const data = await response.json().catch(() => ({ message: 'Ocorreu um erro. Tente novamente.' }));
                    errorDiv.textContent = data.message || 'Senha incorreta.';
                }
            } catch (error) {
                console.error('Erro no login:', error);
                errorDiv.textContent = 'Erro de conexão. Verifique o servidor.';
            } finally {
                // Reabilita o botão e restaura o texto original
                submitButton.disabled = false;
                submitButton.textContent = 'Entrar';
            }
        });

        // Limpar campos sensíveis quando o usuário sair da página
        const clearFields = () => {
            usernameInput.value = '';
            passwordInput.value = '';
            errorDiv.textContent = '';
        };

        // Limpar ao sair da página (funciona na maioria dos navegadores)
        window.addEventListener('beforeunload', clearFields);

        // Limpar quando a página é escondida (mobile e alguns navegadores modernos)
        window.addEventListener('pagehide', clearFields);

        // Limpar quando o usuário navega para outra página
        window.addEventListener('unload', clearFields);
    </script>
</body>

</html>
