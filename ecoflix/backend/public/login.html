<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - EcoFlix Admin</title>
    <link rel="icon" href="/assets/favicon.ico" sizes="any">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">

    <!-- SECURITY: Prevent caching of login page -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta name="robots" content="noindex, nofollow">



    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ecokambio.com/login">
    <meta property="og:title" content="Acesso Restrito - EcoFlix">
    <meta property="og:description" content="Área de acesso restrito para administração do EcoFlix.">
    <meta property="og:image" content="https://ecokambio.com/assets/social-share-banner.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://ecokambio.com/login">
    <meta property="twitter:title" content="Acesso Restrito - EcoFlix">
    <meta property="twitter:description" content="Área de acesso restrito para administração do EcoFlix.">
    <meta property="twitter:image" content="https://ecokambio.com/assets/social-share-banner.png">

    <link rel="stylesheet" href="/css/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }
    </style>

</head>

<body class="flex flex-col min-h-screen">



    <main class="flex-1 flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-sm p-8 space-y-8 bg-white rounded-2xl shadow-lg">
            <div class="text-center">
                <h1 class="text-4xl font-bold text-red-600 mb-6">EcoFlix</h1>
                <h2 class="text-2xl font-bold text-slate-800">Acesso Restrito</h2>
                <p class="mt-2 text-sm text-slate-600">Por favor, insira a senha de administrador.</p>
            </div>
            <form id="login-form" class="mt-8 space-y-6">
                <div class="rounded-md shadow-sm space-y-4">
                    <div>
                        <label for="username" class="sr-only">Email</label>
                        <input id="username" name="username" type="email" required
                            class="appearance-none rounded-md relative block w-full px-3 py-3 border border-slate-300 placeholder-slate-500 text-slate-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                            placeholder="email@exemplo.com" autocomplete="off">
                    </div>
                    <div>
                        <label for="password" class="sr-only">Senha</label>
                        <input id="password" name="password" type="password" required
                            class="appearance-none rounded-md relative block w-full px-3 py-3 border border-slate-300 placeholder-slate-500 text-slate-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                            placeholder="Senha" autocomplete="off">
                    </div>
                </div>

                <div id="error-message" class="text-sm text-red-600 text-center h-4">Use o email autorizado e senha para aceder ao painel</div>

                <div>
                    <button type="submit"
                        class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Entrar
                    </button>
                </div>
            </form>
        </div>
    </main>


    <script>
        const loginForm = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('error-message');
        const submitButton = loginForm.querySelector('button[type="submit"]');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Desabilita o botão e mostra feedback de carregamento
            submitButton.disabled = true;
            submitButton.textContent = 'Verificando...';

            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            errorDiv.textContent = '';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password, redirect: '/ecoflix/admin' }),
                });

                if (response.ok) {
                    sessionStorage.setItem('admin_session_alive', 'true');
                    window.location.href = '/ecoflix/admin';
                } else {
                    const data = await response.json().catch(() => ({ message: 'Ocorreu um erro. Tente novamente.' }));
                    errorDiv.textContent = data.message || 'Senha incorreta.';
                }
            } catch (error) {
                console.error('Erro no login:', error);
                errorDiv.textContent = 'Erro de conexão. Verifique o servidor.';
            } finally {
                // Reabilita o botão e restaura o texto original
                submitButton.disabled = false;
                submitButton.textContent = 'Entrar';
            }
        });

        // Limpar campos sensíveis quando o usuário sair da página
        const clearFields = () => {
            usernameInput.value = '';
            passwordInput.value = '';
            errorDiv.textContent = '';
        };

        // Limpar ao sair da página (funciona na maioria dos navegadores)
        window.addEventListener('beforeunload', clearFields);

        // Limpar quando a página é escondida (mobile e alguns navegadores modernos)
        window.addEventListener('pagehide', clearFields);

        // Limpar quando o usuário navega para outra página
        window.addEventListener('unload', clearFields);
    </script>
</body>

</html>
